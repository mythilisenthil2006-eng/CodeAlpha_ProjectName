<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Learning App</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #07090f; color: #e2e8f0; min-height: 100vh; }
  header { background: #0f1117; border-bottom: 1px solid #1e2333; padding: 15px 22px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 1.2rem; color: #818cf8; font-weight: 700; letter-spacing: 1px; }
  .xp-badge { background: #818cf822; color: #a5b4fc; padding: 6px 14px; border-radius: 20px; font-size: 0.82rem; font-weight: 700; }

  .main { max-width: 860px; margin: 0 auto; padding: 24px 16px; }

  /* Language Picker */
  .lang-selector { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 22px; }
  .lang-btn { padding: 10px 20px; border-radius: 50px; border: 1px solid #1e2333; background: #0f1117; color: #94a3b8; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
  .lang-btn.active { background: #818cf822; border-color: #818cf8; color: #a5b4fc; }
  .lang-btn:hover { border-color: #818cf866; }

  /* Section Tabs */
  .section-tabs { display: flex; gap: 4px; background: #0f1117; border-radius: 12px; padding: 4px; margin-bottom: 20px; border: 1px solid #1e2333; }
  .stab { flex: 1; padding: 10px; border: none; background: none; color: #475569; font-size: 0.82rem; font-weight: 600; cursor: pointer; border-radius: 9px; font-family: inherit; transition: all 0.2s; }
  .stab.active { background: #1e2333; color: #818cf8; }

  /* Lesson Card */
  .lesson-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 22px; }
  .lesson-card { background: #0f1117; border: 1px solid #1e2333; border-radius: 14px; padding: 18px 14px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
  .lesson-card:hover { border-color: #818cf866; transform: translateY(-2px); }
  .lesson-card.active-lesson { border-color: #818cf8; background: #818cf810; }
  .lesson-emoji { font-size: 2rem; margin-bottom: 8px; }
  .lesson-name { font-size: 0.82rem; color: #94a3b8; font-weight: 600; }
  .lesson-count { font-size: 0.7rem; color: #334155; margin-top: 3px; }
  .lesson-badge { position: absolute; top: 8px; right: 8px; background: #22c55e; color: #0d1117; font-size: 0.6rem; font-weight: 700; padding: 2px 6px; border-radius: 8px; }

  /* Flashcard / Lesson View */
  .vocab-section { display: none; }
  .vocab-section.open { display: block; }
  .vocab-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .vocab-header h2 { font-size: 1rem; color: #818cf8; }
  .btn-back { background: none; border: 1px solid #1e2333; color: #94a3b8; padding: 6px 14px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; font-family: inherit; }

  .vocab-card { background: #0f1117; border: 1px solid #1e2333; border-radius: 18px; padding: 36px 28px; text-align: center; margin-bottom: 14px; min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; }
  .vc-lang { font-size: 2.2rem; font-weight: 700; color: #e2e8f0; margin-bottom: 10px; }
  .vc-pronunciation { font-size: 0.85rem; color: #475569; margin-bottom: 6px; font-style: italic; }
  .vc-translation { font-size: 1.1rem; color: #818cf8; font-weight: 600; display: none; margin-top: 10px; }
  .vc-translation.show { display: block; }
  .vc-example { font-size: 0.82rem; color: #334155; margin-top: 8px; display: none; }
  .vc-example.show { display: block; }
  .tap-hint { font-size: 0.75rem; color: #1e2333; position: absolute; bottom: 12px; }

  .vocab-controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
  .btn-vc { padding: 10px 22px; border-radius: 10px; border: none; font-size: 0.85rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; }
  .btn-prev { background: #1e2333; color: #94a3b8; }
  .btn-prev:hover { background: #2d3748; }
  .btn-reveal { background: linear-gradient(135deg, #4f46e5, #818cf8); color: #fff; }
  .btn-reveal:hover { opacity: 0.9; }
  .btn-next { background: #1e2333; color: #94a3b8; }
  .btn-next:hover { background: #2d3748; }

  /* Vocab List */
  .vocab-list { display: flex; flex-direction: column; gap: 8px; }
  .vocab-row { background: #0f1117; border: 1px solid #1e2333; border-radius: 10px; padding: 12px 16px; display: flex; align-items: center; gap: 16px; }
  .vr-word { font-size: 0.95rem; font-weight: 600; color: #e2e8f0; min-width: 100px; }
  .vr-pron { font-size: 0.78rem; color: #475569; flex: 1; font-style: italic; }
  .vr-trans { font-size: 0.85rem; color: #818cf8; font-weight: 600; min-width: 100px; text-align: right; }

  /* Quiz Section */
  .quiz-section { display: none; }
  .quiz-section.open { display: block; }
  .quiz-card { background: #0f1117; border: 1px solid #1e2333; border-radius: 18px; padding: 32px 24px; text-align: center; margin-bottom: 16px; }
  .quiz-q { font-size: 1.1rem; color: #e2e8f0; margin-bottom: 6px; font-weight: 600; }
  .quiz-sub { font-size: 0.82rem; color: #475569; margin-bottom: 22px; }
  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .quiz-opt { padding: 14px; background: #161d2b; border: 1px solid #1e2333; border-radius: 10px; color: #94a3b8; font-size: 0.88rem; cursor: pointer; transition: all 0.2s; font-family: inherit; }
  .quiz-opt:hover { border-color: #818cf866; color: #e2e8f0; }
  .quiz-opt.correct { background: #14532d22; border-color: #22c55e; color: #4ade80; }
  .quiz-opt.wrong { background: #7f1d1d22; border-color: #ef4444; color: #f87171; }
  .quiz-feedback { font-size: 0.9rem; margin-top: 14px; min-height: 22px; font-weight: 600; }
  .quiz-score { display: flex; gap: 20px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
  .score-box { background: #0f1117; border: 1px solid #1e2333; border-radius: 10px; padding: 10px 20px; text-align: center; }
  .score-val { font-size: 1.3rem; font-weight: 700; }
  .score-label { font-size: 0.7rem; color: #475569; text-transform: uppercase; }

  .progress-indicator { display: flex; justify-content: center; gap: 6px; margin-bottom: 16px; }
  .pi-dot { width: 8px; height: 8px; border-radius: 50%; background: #1e2333; transition: background 0.3s; }
  .pi-dot.done { background: #22c55e; }
  .pi-dot.current { background: #818cf8; }

  .section-content { display: none; }
  .section-content.active { display: block; }
</style>
</head>
<body>
<header>
  <h1>🌐 LinguaLearn</h1>
  <span class="xp-badge" id="xpBadge">⭐ 0 XP</span>
</header>

<div class="main">
  <!-- Language Selector -->
  <div class="lang-selector" id="langSelector">
    <button class="lang-btn active" onclick="setLang('Spanish')">🇪🇸 Spanish</button>
    <button class="lang-btn" onclick="setLang('French')">🇫🇷 French</button>
    <button class="lang-btn" onclick="setLang('Japanese')">🇯🇵 Japanese</button>
    <button class="lang-btn" onclick="setLang('German')">🇩🇪 German</button>
    <button class="lang-btn" onclick="setLang('Hindi')">🇮🇳 Hindi</button>
  </div>

  <!-- Section Tabs -->
  <div class="section-tabs">
    <button class="stab active" onclick="switchSection('lessons')">📚 Lessons</button>
    <button class="stab" onclick="switchSection('flashcards')">🃏 Flashcards</button>
    <button class="stab" onclick="switchSection('quiz')">✏️ Quiz</button>
  </div>

  <!-- Lessons Section -->
  <div class="section-content active" id="sec-lessons">
    <div class="lesson-grid" id="lessonGrid"></div>
    <div class="vocab-section" id="vocabSection">
      <div class="vocab-header">
        <h2 id="vocabTitle">Vocabulary</h2>
        <button class="btn-back" onclick="closeVocab()">← Back</button>
      </div>
      <div class="vocab-list" id="vocabList"></div>
    </div>
  </div>

  <!-- Flashcards Section -->
  <div class="section-content" id="sec-flashcards">
    <div class="vocab-card" id="vcCard" onclick="revealCard()">
      <div class="vc-lang" id="vcWord">Select a lesson first</div>
      <div class="vc-pronunciation" id="vcPron"></div>
      <div class="vc-translation" id="vcTrans"></div>
      <div class="vc-example" id="vcEx"></div>
      <div class="tap-hint">Tap to reveal</div>
    </div>
    <div class="vocab-controls">
      <button class="btn-vc btn-prev" onclick="cardNav(-1)">◀</button>
      <button class="btn-vc btn-reveal" onclick="revealCard()">Reveal</button>
      <button class="btn-vc btn-next" onclick="cardNav(1)">▶</button>
    </div>
    <div style="text-align:center; font-size:0.78rem; color:#334155;" id="cardCounter"></div>
  </div>

  <!-- Quiz Section -->
  <div class="section-content" id="sec-quiz">
    <div class="quiz-score">
      <div class="score-box"><div class="score-val green" id="qCorrect">0</div><div class="score-label">Correct</div></div>
      <div class="score-box"><div class="score-val" style="color:#f87171" id="qWrong">0</div><div class="score-label">Wrong</div></div>
      <div class="score-box"><div class="score-val" style="color:#818cf8" id="qStreak">0</div><div class="score-label">Streak 🔥</div></div>
    </div>
    <div class="progress-indicator" id="progIndicator"></div>
    <div class="quiz-card">
      <div class="quiz-q" id="quizQ">Loading quiz...</div>
      <div class="quiz-sub" id="quizSub">Choose the correct translation</div>
      <div class="quiz-options" id="quizOptions"></div>
      <div class="quiz-feedback" id="quizFeedback"></div>
    </div>
    <div style="text-align:center;"><button class="btn-vc btn-reveal" onclick="nextQuestion()" id="nextQBtn" style="display:none">Next Question →</button></div>
  </div>
</div>

let currentLang = 'Spanish';
let currentLesson = null;
let cardIdx = 0;
let cardRevealed = false;
let xp = 0;
let quizData = { correct: 0, wrong: 0, streak: 0, qIdx: 0, allWords: [] };

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(lang)));
  closeVocab();
  renderLessons();
  buildQuiz();
  renderFlashcard();
}

function renderLessons() {
  const lessons = langData[currentLang];
  const grid = document.getElementById('lessonGrid');
  grid.innerHTML = Object.entries(lessons).map(([name, data]) => `
    <div class="lesson-card ${currentLesson === name ? 'active-lesson' : ''}" onclick="openLesson('${name}')">
      <div class="lesson-emoji">${data.emoji}</div>
      <div class="lesson-name">${name}</div>
      <div class="lesson-count">${data.words.length} words</div>
    </div>`).join('');
}

function openLesson(name) {
  currentLesson = name;
  renderLessons();
  const words = langData[currentLang][name].words;
  document.getElementById('vocabTitle').textContent = `${langData[currentLang][name].emoji} ${name}`;
  document.getElementById('vocabList').innerHTML = words.map(w => `
    <div class="vocab-row">
      <div class="vr-word">${w.word}</div>
      <div class="vr-pron">${w.pron}</div>
      <div class="vr-trans">${w.trans}</div>
    </div>`).join('');
  document.getElementById('vocabSection').classList.add('open');
  document.getElementById('lessonGrid').style.display = 'none';
}

function closeVocab() {
  document.getElementById('vocabSection').classList.remove('open');
  document.getElementById('lessonGrid').style.display = 'grid';
  currentLesson = null;
  renderLessons();
}

// Flashcards
function getAllWords() {
  return Object.values(langData[currentLang]).flatMap(l => l.words);
}

function renderFlashcard() {
  const words = getAllWords();
  if (!words.length) return;
  cardIdx = cardIdx % words.length;
  const w = words[cardIdx];
  document.getElementById('vcWord').textContent = w.word;
  document.getElementById('vcPron').textContent = w.pron;
  document.getElementById('vcTrans').textContent = w.trans;
  document.getElementById('vcTrans').className = 'vc-translation';
  document.getElementById('vcEx').textContent = w.ex;
  document.getElementById('vcEx').className = 'vc-example';
  document.getElementById('cardCounter').textContent = `${cardIdx + 1} / ${words.length}`;
  cardRevealed = false;
}

function revealCard() {
  if (!cardRevealed) {
    document.getElementById('vcTrans').classList.add('show');
    document.getElementById('vcEx').classList.add('show');
    cardRevealed = true;
    addXP(5);
  }
}

function cardNav(dir) {
  const words = getAllWords();
  cardIdx = (cardIdx + dir + words.length) % words.length;
  renderFlashcard();
}

// Quiz
function buildQuiz() {
  quizData.allWords = getAllWords();
  quizData.qIdx = 0;
  quizData.correct = 0;
  quizData.wrong = 0;
  quizData.streak = 0;
  renderQuizQuestion();
  updateQuizScore();
}

function renderQuizQuestion() {
  const words = quizData.allWords;
  if (!words.length) return;
  const qi = Math.floor(Math.random() * words.length);
  const correct = words[qi];
  const opts = [correct];
  while (opts.length < 4) {
    const r = words[Math.floor(Math.random() * words.length)];
    if (!opts.find(o => o.trans === r.trans)) opts.push(r);
  }
  opts.sort(() => Math.random() - 0.5);

  document.getElementById('quizQ').textContent = correct.word;
  document.getElementById('quizSub').textContent = `(${correct.pron}) — Choose the correct translation`;
  document.getElementById('quizFeedback').textContent = '';
  document.getElementById('nextQBtn').style.display = 'none';

  const optEl = document.getElementById('quizOptions');
  optEl.innerHTML = opts.map(o => `<button class="quiz-opt" onclick="checkAnswer(this,'${o.trans}','${correct.trans}')">${o.trans}</button>`).join('');

  // Progress dots
  const prog = document.getElementById('progIndicator');
  prog.innerHTML = Array(10).fill(0).map((_, i) => `<div class="pi-dot ${i < quizData.qIdx ? 'done' : i === quizData.qIdx ? 'current' : ''}"></div>`).join('');
}

function checkAnswer(btn, chosen, correct) {
  document.querySelectorAll('.quiz-opt').forEach(b => b.style.pointerEvents = 'none');
  if (chosen === correct) {
    btn.classList.add('correct');
    document.getElementById('quizFeedback').innerHTML = '<span style="color:#4ade80">✓ Correct!</span>';
    quizData.correct++;
    quizData.streak++;
    addXP(10);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.quiz-opt').forEach(b => { if (b.textContent === correct) b.classList.add('correct'); });
    document.getElementById('quizFeedback').innerHTML = `<span style="color:#f87171">✗ Correct answer: ${correct}</span>`;
    quizData.wrong++;
    quizData.streak = 0;
  }
  quizData.qIdx = Math.min(quizData.qIdx + 1, 10);
  updateQuizScore();
  document.getElementById('nextQBtn').style.display = 'inline-block';
}

function nextQuestion() { renderQuizQuestion(); }

function updateQuizScore() {
  document.getElementById('qCorrect').textContent = quizData.correct;
  document.getElementById('qWrong').textContent = quizData.wrong;
  document.getElementById('qStreak').textContent = quizData.streak;
}

function addXP(pts) {
  xp += pts;
  document.getElementById('xpBadge').textContent = `⭐ ${xp} XP`;
}

function switchSection(name) {
  document.querySelectorAll('.stab').forEach((t, i) => t.classList.toggle('active', ['lessons','flashcards','quiz'][i] === name));
  document.querySelectorAll('.section-content').forEach(c => c.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  if (name === 'flashcards') renderFlashcard();
  if (name === 'quiz') buildQuiz();
}

// Init
renderLessons();
buildQuiz();
</script>
